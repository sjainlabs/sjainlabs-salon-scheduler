<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pending Requests – SalonFlow</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
<script>
  if (localStorage.getItem("role") !== "owner") {
    window.location.href = "login.html";
  }
</script>

<div class="app-shell">

<header class="header">
  <div class="header-title">Pending Requests</div>
  <nav class="header-nav">
    <a href="owner-home.html">Dashboard</a>
    <a href="scheduler-owner.html">Scheduler</a>
  </nav>
</header>

<div class="card">
  <h1>Pending Customer Requests</h1>
</div>

<div class="card">
  <table class="table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Mobile</th>
        <th>Message</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Sarah Miller</td>
        <td>+1 555 000 9999</td>
        <td>I’d like to book an appointment.</td>
        <td>
          <button class="btn btn-primary">Approve</button>
          <button class="btn btn-outline" style="margin-left:6px;">Deny</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>

</div>
</body>
</html>
