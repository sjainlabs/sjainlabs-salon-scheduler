<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Customer Approvals – SalonFlow</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app-shell">

<header class="header">
  <div class="header-title">SalonFlow – Approvals</div>
</header>

<div class="card">
  <h1>Pending Customer Requests</h1>
  <p style="margin-top:6px;">Approve or deny new customer access.</p>
</div>

<div class="card">
  <table class="table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Mobile</th>
        <th>Message</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Sarah Miller</td>
        <td>+1 555 000 9999</td>
        <td>I’d like to book an appointment.</td>
        <td>
          <button class="btn btn-primary">Approve</button>
          <button class="btn btn-outline" style="margin-left:6px;">Deny</button>
        </td>
      </tr>
      <tr>
        <td>John Carter</td>
        <td>+1 555 111 8822</td>
        <td>New customer request.</td>
        <td>
          <button class="btn btn-primary">Approve</button>
          <button class="btn btn-outline" style="margin-left:6px;">Deny</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<a href="owner-availability.html">
  <button class="btn btn-primary" style="margin-top:16px;">Continue</button>
</a>

</div>
</body>
</html>
