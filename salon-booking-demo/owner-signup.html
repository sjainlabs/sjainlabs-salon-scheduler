<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Owner Signup – SalonFlow</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app-shell">

<header class="header"><div class="header-title">SalonFlow – Owner Signup</div></header>

<div class="card" style="max-width:420px;">
  <h1>Create your owner account</h1>

  <div class="label">Full Name</div>
  <input class="input" placeholder="Ava Thompson" />

  <div class="label">Email</div>
  <input class="input" placeholder="ava@example.com" />

  <div class="label">Password</div>
  <input class="input" type="password" placeholder="••••••••" />

  <a href="owner-email-verify.html">
    <button class="btn btn-primary" style="margin-top:12px;">Create Account</button>
  </a>
</div>

</div>
</body>
</html>
