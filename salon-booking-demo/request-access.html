<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Request Access – SalonFlow</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app-shell">

<header class="header">
  <div class="header-title">SalonFlow – Request Access</div>
  <nav class="header-nav">
    <a href="index.html">Home</a>
  </nav>
</header>

<div class="card" style="max-width: 420px;">
  <h1>Request Access</h1>
  <p style="margin-top: 6px;">Tell the owner who you are and why you want to join.</p>

  <div class="label">Full Name</div>
  <input class="input" placeholder="Your Name" />

  <div class="label">Mobile Number</div>
  <input class="input" placeholder="+1 555 000 9999" />

  <div class="label">Short Message</div>
  <textarea class="input" style="height: 80px;" placeholder="I'd like to book an appointment..."></textarea>

  <a href="request-access-submitted.html">
    <button class="btn btn-primary" style="margin-top: 12px;">Submit Request</button>
  </a>
</div>

</div>
</body>
</html>
