<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login – SalonFlow</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
<div class="app-shell">

<header class="header">
  <div class="header-title">SalonFlow – Login</div>
</header>

<div class="card" style="max-width:420px;">
  <h1>Sign in</h1>

  <div class="label">Email</div>
  <input id="email" class="input" placeholder="you@example.com" />

  <div class="label">Password</div>
  <input id="password" class="input" type="password" placeholder="••••••••" />

  <button class="btn btn-primary" style="margin-top:12px;" onclick="login()">Login</button>
</div>

</div>

<script>
  const users = {
    "owner@example.com": { role: "owner", password: "password123" },
    "emily.carter@gmail.com": { role: "customer", password: "test123", mobile: "+13145550192" },
    "james.lee@gmail.com": { role: "customer", password: "test123", mobile: "+16365552211" }
  };

  function login() {
    const email = document.getElementById("email").value.trim();
    const pwd = document.getElementById("password").value.trim();

    const user = users[email];

    if (!user || user.password !== pwd) {
      alert("Invalid credentials");
      return;
    }

    localStorage.setItem("role", user.role);
    localStorage.setItem("email", email);

    if (user.role === "owner") {
      window.location.href = "owner-home.html";
    } else {
      window.location.href = "mobile-verify.html";
    }
  }
</script>

</body>
</html>
