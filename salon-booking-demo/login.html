<html lang="en">

</head>

  </nav>

<!-- CUSTOMER LOGIN -->
<div class="card" style="max-width:420px;">
  <h1>Customer Login</h1>
  <p style="margin-top:6px;">Use your preferred login method.</p>

  <button class="btn btn-primary" style="width:100%; margin-top:16px;" onclick="customerLogin()">
    Continue with Google
  </button>

  <button class="btn btn-outline" style="width:100%; margin-top:10px;" onclick="customerLogin()">
    Continue with Apple
  </button>

  <p style="margin-top:16px; font-size:0.85rem; color:#6b7280;">
    After login, we’ll verify your mobile number.
  </p>
</div>

<!-- OWNER LOGIN -->
<div class="card" style="max-width:420px; margin-top:24px;">

  <div class="label">Email</div>
  <input id="ownerEmail" class="input" placeholder="owner@example.com" />

  <div class="label">Password</div>
  <input id="ownerPassword" class="input" type="password" placeholder="••••••••" />

  <button class="btn btn-primary" style="margin-top:12px;" onclick="ownerLogin()">
    Login as Owner
  </button>
</div>

</div>
