<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Add Customer – SalonFlow</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
<script>
  if (localStorage.getItem("role") !== "owner") {
    window.location.href = "login.html";
  }
</script>

<div class="app-shell">

<header class="header">
  <div class="header-title">Add Customer</div>
  <nav class="header-nav">
    <a href="owner-home.html">Dashboard</a>
    <a href="scheduler-owner.html">Scheduler</a>
  </nav>
</header>

<div class="card" style="max-width:420px;">
  <h1>Add New Customer</h1>

  <div class="label">Full Name</div>
  <input class="input" placeholder="Sarah Miller" />

  <div class="label">Mobile Number</div>
  <input class="input" placeholder="+1 314 555 0192" />

  <div class="label">Email (optional)</div>
  <input class="input" placeholder="sarah@example.com" />

  <button class="btn btn-primary" style="margin-top:12px;">Add Customer</button>
</div>

</div>
</body>
</html>
