<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Customer Booking – SalonFlow</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
<script>
  if (localStorage.getItem("role") !== "customer") {
    window.location.href = "login.html";
  }
</script>

<div class="app-shell">

<header class="header">
  <div class="header-title">SalonFlow – Customer</div>
  <nav class="header-nav">
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
  </nav>
</header>

<div class="card">
  <h1>Book an appointment</h1>

  <div style="margin-top:12px; max-width:320px;">
    <div class="label">Date</div>
    <input class="input" type="date" />

    <div class="label">Service</div>
    <select class="input">
      <option>Threading – 15 min</option>
      <option>Haircut (Female) – 30 min</option>
      <option>Kid Haircut (Female) – 30 min</option>
      <option>Hairstyle – 45 min</option>
      <option>Kid Haircut (Male) – 20 min</option>
      <option>Haircut (Male) – 20 min</option>
    </select>
  </div>
</div>

<div class="card">
  <h2>Available slots</h2>
  <div class="chip-row">
    <div class="chip">09:00 AM</div>
    <div class="chip">10:00 AM</div>
    <div class="chip">11:30 AM</div>
    <div class="chip">02:00 PM</div>
    <div class="chip">03:30 PM</div>
  </div>

  <button class="btn btn-primary" style="margin-top:16px;">Confirm Selected Slot</button>
</div>

<div class="card">
  <h2>Your upcoming appointments</h2>
  <table class="table">
    <thead>
      <tr>
        <th>Date</th>
        <th>Time</th>
        <th>Service</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Mar 24</td>
        <td>10:00 AM</td>
        <td>Haircut (Female)</td>
        <td>
          <a href="customer-modify.html" class="btn btn-outline">Modify</a>
          <a href="customer-cancel.html" class="btn btn-outline" style="margin-left:6px;">Cancel</a>
        </td>
      </tr>
    </tbody>
  </table>
</div>

</div>
</body>
</html>
