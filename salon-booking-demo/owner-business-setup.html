<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Business Setup – SalonFlow</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app-shell">

<header class="header"><div class="header-title">SalonFlow – Business Setup</div></header>

<div class="card" style="max-width:480px;">
  <h1>Set up your salon</h1>

  <div class="label">Salon Name</div>
  <input class="input" placeholder="Ava’s Hair Studio" />

  <div class="label">Location</div>
  <input class="input" placeholder="123 Main St, St. Louis, MO" />

  <div class="label">Services Offered</div>
  <textarea class="input" style="height:80px;" placeholder="Haircut, Styling, Color..."></textarea>

  <a href="add-customer.html">
    <button class="btn btn-primary" style="margin-top:12px;">Continue</button>
  </a>
</div>

</div>
</body>
</html>
