<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Verify Mobile – SalonFlow</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
<script>
  if (localStorage.getItem("role") !== "customer") {
    window.location.href = "login.html";
  }

  const customers = {
    "emily.carter@gmail.com": "+13145550192",
    "james.lee@gmail.com": "+16365552211"
  };

  function verifyMobile() {
    const email = localStorage.getItem("email");
    const expected = customers[email];
    const entered = document.getElementById("mobileInput").value.trim();

    if (entered === expected) {
      window.location.href = "scheduler-customer.html";
    } else {
      window.location.href = "request-access.html";
    }
  }
</script>

<div class="app-shell">

<header class="header">
  <div class="header-title">Verify Mobile</div>
</header>

<div class="card" style="max-width:420px;">
  <h1>Verify your mobile number</h1>

  <div class="label">Mobile Number</div>
  <input id="mobileInput" class="input" placeholder="+1 314 555 0192" />

  <button class="btn btn-primary" style="margin-top:12px;" onclick="verifyMobile()">
    Continue
  </button>
</div>

</div>
</body>
</html>
